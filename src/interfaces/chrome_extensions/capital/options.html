<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Capital KO Trader — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-width: 420px; max-width: 520px; margin: 0 auto;
      background: #0f1419; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px; padding: 32px 24px;
    }
    h1 { color: #4fc3f7; font-size: 20px; margin-bottom: 28px; }
    .group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #7a8fa0; text-transform: uppercase;
            letter-spacing: .5px; margin-bottom: 5px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: #1a2433; border: 1px solid #263040; border-radius: 6px;
      color: #e0e0e0; padding: 9px 12px; font-size: 14px; outline: none;
    }
    input:focus { border-color: #4fc3f7; }
    .toggle-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .toggle-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .toggle-row span { font-size: 13px; color: #c0cfd8; }
    .btn-save {
      background: #0d7a47; border: none; border-radius: 8px; color: #fff;
      padding: 11px 28px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px;
    }
    .btn-save:hover { filter: brightness(1.15); }
    .status { margin-top: 14px; font-size: 13px; min-height: 20px; }
    .status.ok    { color: #4caf50; }
    .status.error { color: #f44336; }
    .divider { border: none; border-top: 1px solid #1e2a38; margin: 24px 0; }
    .note { font-size: 12px; color: #4a6070; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Capital KO Trader Settings</h1>

  <div class="group">
    <label>API Key</label>
    <input type="text" id="apiKey" placeholder="Your Capital.com API key" autocomplete="off">
  </div>
  <div class="group">
    <label>Username / Email</label>
    <input type="text" id="username" placeholder="account@email.com" autocomplete="off">
  </div>
  <div class="group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Capital.com password" autocomplete="current-password">
  </div>
  <div class="group">
    <label>Account type</label>
    <div class="toggle-row">
      <input type="checkbox" id="isDemo">
      <span>Use Demo account (uncheck for Live)</span>
    </div>
  </div>

  <button class="btn-save" id="saveBtn">Save &amp; Test Connection</button>
  <div class="status" id="status"></div>

  <hr class="divider">
  <p class="note">
    Credentials are stored in Chrome sync storage (encrypted at rest, synced to your signed-in Chrome profile).<br><br>
    API key is found in Capital.com → Account → API Keys.
  </p>

  <script src="options.js"></script>
</body>
</html>
